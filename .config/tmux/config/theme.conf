###############################################################################
# Vim-style Keybinds
###############################################################################

# Enable vi mode for copy/paste
set-window-option -g mode-keys vi

# Vim-like pane navigation (no prefix needed) - Modificado para evitar conflictos
bind -n C-h select-pane -L  # izquierda
bind -n C-j select-pane -D  # abajo
bind -n C-k select-pane -U  # arriba
#bind -n C-l select-pane -R  # deshabilitado por conflicto con clear

# Vim-like copy mode bindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

###############################################################################
# Window/Pane Management (Updated)
###############################################################################

# Splits modificados (sin Shift)
bind v split-window -v -c "#{pane_current_path}"  # Vertical con `+v
bind b split-window -h -c "#{pane_current_path}"  # Horizontal con `+b

# Ventanas (conservando tus binds actuales)
bind c new-window -c "#{pane_current_path}"  # `+c: nueva ventana
bind x kill-window                           # `+x: kill window

# Pane
bind & kill-window
bind x kill-pane

###############################################################################
# Mode Copy Access (Replaces `+[)
###############################################################################

# Entrar en modo copia con `+m
bind m copy-mode

###############################################################################
# Misc Binds
###############################################################################

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# Prefix configuration 
set -g prefix `
unbind C-b
bind ` send-prefix
