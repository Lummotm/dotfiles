# ──────────────────────────────────────────────────────────────────────────────
# Paleta Catppuccin Mocha
# ──────────────────────────────────────────────────────────────────────────────
set -g @ctp_crust        "#11111B"  # Tonos más oscuros
set -g @ctp_mantle       "#181825"
set -g @ctp_base         "#1E1E2E"
set -g @ctp_surface0     "#313244"
set -g @ctp_surface1     "#585B70"
set -g @ctp_surface2     "#7F849C"
set -g @ctp_overlay0     "#9399B2"
set -g @ctp_subtext0     "#A6ADC8"
set -g @ctp_subtext1     "#BAC2DE"
set -g @ctp_text         "#CDD6F4"

set -g @ctp_red          "#F38BA8"
set -g @ctp_mauve        "#CBA6F7"
set -g @ctp_pink         "#F5C2E7"
set -g @ctp_peach        "#FAB387"
set -g @ctp_yellow       "#F9E2AF"
set -g @ctp_green        "#A6E3A1"
set -g @ctp_teal         "#94E2D5"
set -g @ctp_sky          "#89DCEB"
set -g @ctp_blue         "#89B4FA"
set -g @ctp_sapphire     "#74C7EC"
set -g @ctp_lavender     "#B4BEFE"

# ──────────────────────────────────────────────────────────────────────────────
# Carga de paleta (si usas wal, comenta la línea original)
# ──────────────────────────────────────────────────────────────────────────────
# source ~/.cache/wal/colors.tmux

# ──────────────────────────────────────────────────────────────────────────────
# Status bar
# ──────────────────────────────────────────────────────────────────────────────
set -g status on
set -g status-position top
set -g status-style "bg=#{@ctp_surface0},fg=#{@ctp_text}"
set -g status-justify left
set -g status-left-length 90
set -g status-right-length 90

# ──────────────────────────────────────────────────────────────────────────────
# Modo (izquierda) y fecha/hora (derecha)
# ──────────────────────────────────────────────────────────────────────────────
set -g status-left  "#[bg=#{@ctp_mauve},fg=#{@ctp_crust}] #{tmux_mode_indicator} #[bg=#{@ctp_surface0}] "
set -g status-right "#[fg=#{@ctp_text},bg=#{@ctp_surface0}] %H:%M #[fg=#{@ctp_subtext1},bg=#{@ctp_surface1}] %d-%b-%y #[fg=#{@ctp_overlay0},bg=#{@ctp_surface0}]"

# ──────────────────────────────────────────────────────────────────────────────
# Indicadores de modo
# ──────────────────────────────────────────────────────────────────────────────
set -g @mode_indicator_prefix_mode_style "bg=#{@ctp_yellow},fg=#{@ctp_crust}"
set -g @mode_indicator_copy_mode_style   "bg=#{@ctp_sky},fg=#{@ctp_crust}"
set -g @mode_indicator_sync_mode_style   "bg=#{@ctp_lavender},fg=#{@ctp_crust}"
set -g @mode_indicator_empty_mode_style  "bg=#{@ctp_surface1},fg=#{@ctp_crust}"

set -g @mode_indicator_prefix_prompt " WAIT "
set -g @mode_indicator_copy_prompt   " COPY "
set -g @mode_indicator_sync_prompt   " SYNC "

# ──────────────────────────────────────────────────────────────────────────────
# Ventanas (inactivas/activas)
# ──────────────────────────────────────────────────────────────────────────────
setw -g window-status-format         "#[fg=#{@ctp_subtext0},bg=#{@ctp_surface0}] #I:#W "
setw -g window-status-current-format "#[fg=#{@ctp_text},bg=#{@ctp_surface2},bold] #I:#W "
setw -g window-status-separator       " "

