###############################################################################
# Tokyo Night Theme Configuration
###############################################################################

# Base Colors (Tokyo Night palette)
bg="#1a1b26"          # Main background
fg="#9299ba"          # Primary text color
accent="#7aa2f7"      # Active element highlight
inactive="#3b4261"    # Inactive pane borders

### Status Bar Configuration ###
set -g status on
set -g status-justify centre
set -g status-position bottom
set -g status-style "bg=$bg,fg=$fg"
set -g status-left-length 90
set -g status-right-length 90

# Window Styles (consistent background)
set -g window-style "fg=$fg,bg=$bg"
set -g window-active-style "fg=$fg,bg=$bg"  # No visual change on focus

### Pane Border Configuration ###
set -g pane-border-style "fg=$inactive,bg=$bg"         # Inactive pane border
set -g pane-active-border-style "fg=$accent,bg=$bg"    # Active pane border 
setw -g pane-border-status off                         # Clean border style
set -g pane-border-lines single                        # Minimal border style

### Mode Indicator Configuration (preserved from your original) ###
set -g @mode_indicator_prefix_prompt " WAIT #[default]#[fg=$green]"
set -g @mode_indicator_prefix_mode_style "bg=$green,fg=$fg"
set -g @mode_indicator_copy_prompt " COPY #[default]#[fg=$accent]"
set -g @mode_indicator_copy_mode_style "bg=$accent,fg=$fg"
set -g @mode_indicator_empty_prompt " TMUX #[default]#[fg=$inactive]"
set -g @mode_indicator_empty_mode_style "bg=$bg,fg=$inactive"

### Window Status Formatting ###
setw -g window-status-separator ""
setw -g window-status-format "#[fg=$inactive] #I:#W "          # Inactive window
setw -g window-status-current-format "#[fg=$accent] #I:#W "    # Active window

### Status Line Content ###
set -g status-left "#{tmux_mode_indicator}"
set -g status-right "#[fg=$inactive]%H:%M #[fg=$accent]%d-%b"

### Message Display Style ###
set -g message-style "bg=$accent,fg=$bg"
set -g message-command-style "bg=$accent,fg=$bg"
